<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>睡眠日誌後台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --border: #e8e5e0;
    --border-strong: #ccc9c2;
    --text: #1a1917;
    --muted: #6b6860;
    --hint: #a8a59f;
    --radius: 10px;
    --radius-lg: 14px;
  }

  body {
    font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Login */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 340px;
  }
  .login-card h1 { font-size: 18px; margin-bottom: 4px; }
  .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 1.5rem; }
  .login-card input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    margin-bottom: 10px;
  }
  .login-card input:focus { outline: none; border-color: var(--border-strong); }
  .login-btn {
    width: 100%;
    padding: 11px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
  }
  .login-err { font-size: 13px; color: #a03030; margin-top: 8px; display: none; }

  /* Dashboard */
  .dashboard { display: none; }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .logout-btn {
    padding: 6px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: var(--muted);
  }
  .logout-btn:hover { color: var(--text); border-color: var(--text); }

  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
  }
  .metric .m-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .metric .m-val { font-size: 24px; font-weight: 600; letter-spacing: -0.5px; }
  .metric .m-sub { font-size: 12px; color: var(--hint); margin-top: 3px; }

  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 10px;
  }
  .controls-left { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-input {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
  }
  .filter-input:focus { outline: none; border-color: var(--border-strong); }
  .filter-select {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
  }
  .export-btn {
    padding: 7px 14px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: var(--text);
    display: flex; align-items: center; gap: 6px;
  }
  .export-btn:hover { background: var(--bg); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  thead { background: var(--bg); }
  th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--hint);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    white-space: nowrap;
  }
  .badge-gray { background: #f0eeeb; color: var(--muted); }
  .badge-warn { background: #fff3e0; color: #c17700; }
  .badge-danger { background: #fff0f0; color: #c03030; }
  .badge-ok { background: #f0f7f0; color: #2a7a3a; }

  .stars-display { color: #c8a84b; font-size: 14px; letter-spacing: 1px; }
  .stars-display .empty { color: #ddd; }

  .duration { font-size: 13px; color: var(--muted); }

  .empty-row td { text-align: center; color: var(--hint); padding: 3rem; }

  .loading { text-align: center; padding: 3rem; color: var(--hint); font-size: 14px; }

  .refresh-btn {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: transparent;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    color: var(--muted);
  }
  .refresh-btn:hover { color: var(--text); }

  .record-total { font-size: 13px; color: var(--muted); }

  @media (max-width: 768px) {
    .summary-grid { grid-template-columns: repeat(2, 1fr); }
    .topbar { padding: 0 1rem; }
    .main { padding: 1.25rem 1rem; }
    .table-wrap { overflow-x: auto; }
    table { min-width: 700px; }
  }
</style>
</head>
<body>

<!-- 登入 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <h1>後台管理</h1>
    <p>睡眠日誌數據中心</p>
    <input type="password" id="pwd-input" placeholder="輸入管理密碼" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="login-err">密碼錯誤</div>
  </div>
</div>

<!-- 後台 -->
<div class="dashboard" id="dashboard">
  <div class="topbar">
    <h1>睡眠日誌後台</h1>
    <div class="topbar-right">
      <span class="record-total" id="record-total"></span>
      <button class="refresh-btn" onclick="loadData()">重新整理</button>
      <button class="logout-btn" onclick="logout()">登出</button>
    </div>
  </div>

  <div class="main">
    <div class="summary-grid">
      <div class="metric">
        <div class="m-label">總筆數</div>
        <div class="m-val" id="s-total">—</div>
        <div class="m-sub">份日誌</div>
      </div>
      <div class="metric">
        <div class="m-label">平均睡眠時數</div>
        <div class="m-val" id="s-sleep">—</div>
        <div class="m-sub">小時/晚</div>
      </div>
      <div class="metric">
        <div class="m-label">平均入睡品質</div>
        <div class="m-val" id="s-quality">—</div>
        <div class="m-sub">/ 5 分</div>
      </div>
      <div class="metric">
        <div class="m-label">難以再入睡比率</div>
        <div class="m-val" id="s-insomnia">—</div>
        <div class="m-sub">的記錄有此情形</div>
      </div>
    </div>

    <div class="controls">
      <div class="controls-left">
        <input class="filter-input" type="date" id="filter-from" placeholder="起始日期" onchange="applyFilter()">
        <span style="font-size:13px;color:var(--muted);">至</span>
        <input class="filter-input" type="date" id="filter-to" placeholder="結束日期" onchange="applyFilter()">
        <select class="filter-select" id="filter-quality" onchange="applyFilter()">
          <option value="">所有品質</option>
          <option value="5">★★★★★ 5分</option>
          <option value="4">★★★★ 4分</option>
          <option value="3">★★★ 3分</option>
          <option value="2">★★ 2分</option>
          <option value="1">★ 1分</option>
        </select>
        <select class="filter-select" id="filter-wakeup" onchange="applyFilter()">
          <option value="">所有醒來情形</option>
          <option value="none">未曾醒來</option>
          <option value="1-2">醒 1–2 次</option>
          <option value="3+">醒 3 次以上</option>
        </select>
      </div>
      <button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>日期</th>
            <th>躺床</th>
            <th>入睡</th>
            <th>醒來</th>
            <th>起床</th>
            <th>睡眠時長</th>
            <th>中間醒來</th>
            <th>難以再入睡</th>
            <th>品質</th>
            <th>填寫時間</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="10" class="empty-row" style="text-align:center;color:var(--hint);padding:2rem;">載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
  // ====================================================
  // 🔧 請替換為你的 Supabase 專案資訊
  const SUPABASE_URL = 'https://wxdyrowwzdptktdravpb.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4ZHlyb3d3emRwdGt0ZHJhdnBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzQwMzgsImV4cCI6MjA5MDU1MDAzOH0.G_v_X_aU8QCu5baa3PqktYAMniVzMIcDqpBuZEO_uFQ'

  // 🔑 後台管理密碼（請自行修改）
  const ADMIN_PASSWORD = 'sleep804'
  // ====================================================

  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let allLogs = []
  let filtered = []

  function doLogin() {
    const val = document.getElementById('pwd-input').value
    const err = document.getElementById('login-err')
    if (val === ADMIN_PASSWORD) {
      document.getElementById('login-wrap').style.display = 'none'
      document.getElementById('dashboard').style.display = 'block'
      loadData()
    } else {
      err.style.display = 'block'
      setTimeout(() => err.style.display = 'none', 2000)
    }
  }

  function logout() {
    document.getElementById('login-wrap').style.display = 'flex'
    document.getElementById('dashboard').style.display = 'none'
    document.getElementById('pwd-input').value = ''
  }

  async function loadData() {
    const tbody = document.getElementById('table-body')
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--hint);padding:2rem;">載入中...</td></tr>'

    const { data, error } = await db
      .from('sleep_logs')
      .select('*')
      .order('date', { ascending: false })

    if (error) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:#a03030;padding:2rem;">載入失敗：${error.message}</td></tr>`
      return
    }

    allLogs = data || []
    applyFilter()
    updateSummary(allLogs)
  }

  function applyFilter() {
    const from = document.getElementById('filter-from').value
    const to = document.getElementById('filter-to').value
    const quality = document.getElementById('filter-quality').value
    const wakeup = document.getElementById('filter-wakeup').value

    filtered = allLogs.filter(l => {
      if (from && l.date < from) return false
      if (to && l.date > to) return false
      if (quality && l.quality != quality) return false
      if (wakeup && l.wakeup_count !== wakeup) return false
      return true
    })

    renderTable(filtered)
    document.getElementById('record-total').textContent = `顯示 ${filtered.length} / ${allLogs.length} 筆`
  }

  function calcDuration(sleep, wake) {
    if (!sleep || !wake) return null
    const toMins = t => { const [h,m] = t.split(':').map(Number); return h*60+m }
    let diff = toMins(wake) - toMins(sleep)
    if (diff < 0) diff += 1440
    return diff
  }

  function fmtDur(mins) {
    const h = Math.floor(mins/60)
    const m = mins%60
    return h + 'h' + (m > 0 ? ' ' + m + 'm' : '')
  }

  function starsHTML(n) {
    return Array(5).fill(0).map((_,i) =>
      `<span class="${i < n ? '' : 'empty'}">★</span>`
    ).join('')
  }

  function wakeLabel(v) {
    if (v === 'none') return ['badge-ok', '未曾醒來']
    if (v === '1-2') return ['badge-warn', '醒 1–2 次']
    return ['badge-danger', '醒 3 次以上']
  }

  function fmtDatetime(iso) {
    if (!iso) return '—'
    const d = new Date(iso)
    return d.toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' }) +
      ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' })
  }

  function renderTable(logs) {
    const tbody = document.getElementById('table-body')
    if (logs.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:var(--hint);padding:2rem;">沒有符合條件的記錄</td></tr>'
      return
    }

    tbody.innerHTML = logs.map(l => {
      const dur = calcDuration(l.sleep_time, l.wake_time)
      const [wBadge, wLabel] = wakeLabel(l.wakeup_count)
      return `<tr>
        <td><strong>${l.date}</strong></td>
        <td>${l.bed_time || '—'}</td>
        <td>${l.sleep_time || '—'}</td>
        <td>${l.wake_time || '—'}</td>
        <td>${l.up_time || '—'}</td>
        <td class="duration">${dur ? fmtDur(dur) : '—'}</td>
        <td><span class="badge ${wBadge}">${wLabel}</span></td>
        <td><span class="badge ${l.insomnia ? 'badge-danger' : 'badge-ok'}">${l.insomnia ? '是' : '否'}</span></td>
        <td><span class="stars-display">${starsHTML(l.quality)}</span></td>
        <td style="color:var(--hint);font-size:13px;">${fmtDatetime(l.created_at)}</td>
      </tr>`
    }).join('')
  }

  function updateSummary(logs) {
    document.getElementById('s-total').textContent = logs.length

    const durs = logs.map(l => calcDuration(l.sleep_time, l.wake_time)).filter(Boolean)
    if (durs.length) {
      const avg = durs.reduce((a,b)=>a+b,0)/durs.length
      document.getElementById('s-sleep').textContent = (avg/60).toFixed(1)
    } else {
      document.getElementById('s-sleep').textContent = '—'
    }

    if (logs.length) {
      const avgQ = (logs.reduce((a,l)=>a+l.quality,0)/logs.length).toFixed(1)
      document.getElementById('s-quality').textContent = avgQ
      const rate = Math.round(logs.filter(l=>l.insomnia).length/logs.length*100)
      document.getElementById('s-insomnia').textContent = rate + '%'
    }
  }

  function exportCSV() {
    if (filtered.length === 0) return
    const headers = ['日期','躺床時間','入睡時間','醒來時間','起床時間','睡眠時長(分鐘)','中間醒來','難以再入睡','品質(1-5)','填寫時間']
    const rows = filtered.map(l => [
      l.date,
      l.bed_time || '',
      l.sleep_time || '',
      l.wake_time || '',
      l.up_time || '',
      calcDuration(l.sleep_time, l.wake_time) || '',
      l.wakeup_count === 'none' ? '未曾醒來' : l.wakeup_count === '1-2' ? '醒1-2次' : '醒3次以上',
      l.insomnia ? '是' : '否',
      l.quality,
      l.created_at || ''
    ])
    const csv = [headers, ...rows].map(r => r.map(c => `"${c}"`).join(',')).join('\n')
    const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' })
    const url = URL.createObjectURL(blob)
    const a = document.createElement('a')
    a.href = url
    a.download = `睡眠日誌_${new Date().toISOString().slice(0,10)}.csv`
    a.click()
  }
</script>
</body>
</html>
