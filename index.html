<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>睡眠日誌</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:          #f0ece6;
    --surface:     #faf8f5;
    --border:      #ddd8d0;
    --border-sel:  #8c7b6e;
    --text:        #4a3f35;
    --muted:       #7a6e65;
    --hint:        #a89e96;
    --accent:      #8c7b6e;
    --accent-deep: #6b5a50;
    --sel-bg:      #f0ebe5;
    --radius:      14px;
    --radius-lg:   18px;
  }

  body {
    font-family: 'PingFang TC', 'Noto Sans TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 4rem;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1.75rem 1.5rem 1.5rem;
    margin-bottom: 1.75rem;
    text-align: center;
  }
  .header-bear { font-size: 60px; line-height: 1; margin-bottom: 10px; }
  .header h1 { font-size: 19px; font-weight: 700; color: var(--text); }
  .header p { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  .container { max-width: 480px; margin: 0 auto; padding: 0 1.25rem; }

  .section { margin-bottom: 1.75rem; }
  .section-label {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 4px; height: 17px;
    background: var(--accent);
    border-radius: 2px;
    flex-shrink: 0;
  }

  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .field input[type="text"],
  .field input[type="date"],
  .field input[type="time"] {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-size: 16px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .field input:focus { outline: none; border-color: var(--border-sel); }
  .field input::placeholder { color: var(--hint); }

  .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .radio-group { display: flex; flex-direction: column; gap: 10px; }
  .radio-opt {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--surface);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .radio-opt:active { transform: scale(0.98); }
  .radio-opt.sel { border-color: var(--border-sel); background: var(--sel-bg); }
  .radio-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    background: var(--surface);
  }
  .radio-opt.sel .radio-dot { border-color: var(--accent-deep); background: var(--accent-deep); }
  .radio-opt.sel .radio-dot::after { content:''; width:8px; height:8px; border-radius:50%; background:#fff; }
  .radio-opt span { font-size: 15px; color: var(--text); }

  #wake-dur-section { display: none; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    gap: 12px;
  }
  .toggle-text { font-size: 15px; color: var(--text); font-weight: 600; }
  .toggle-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .switch {
    width: 52px; height: 30px;
    border-radius: 15px;
    background: var(--border);
    border: none; cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .switch.on { background: var(--accent-deep); }
  .switch::after {
    content: '';
    position: absolute;
    top: 4px; left: 4px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #fff;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
  }
  .switch.on::after { transform: translateX(22px); }

  /* 魚評分 */
  .fish-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
  }
  .fish-btn {
    width: 52px; height: 52px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    cursor: pointer;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    line-height: 1;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .fish-btn:active { transform: scale(0.9); }
  .fish-btn.lit { border-color: var(--border-sel); background: var(--sel-bg); }
  .fish-label {
    font-size: 13px;
    color: var(--hint);
    flex: 1;
    padding-left: 4px;
  }
  .quality-hint {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--hint);
    padding: 0 4px;
  }

  .submit {
    width: 100%;
    padding: 16px;
    background: var(--accent-deep);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 0.5rem;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
  }
  .submit:active { opacity: 0.8; }
  .submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .success {
    display: none;
    text-align: center;
    padding: 4rem 1rem;
  }
  .success-bear { font-size: 64px; margin-bottom: 14px; }
  .success h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .success p { font-size: 14px; color: var(--muted); margin-bottom: 2rem; line-height: 1.7; }
  .success button {
    padding: 13px 30px;
    border: 2px solid var(--border-sel);
    border-radius: var(--radius);
    background: transparent;
    font-size: 15px;
    font-family: inherit;
    cursor: pointer;
    color: var(--text);
    font-weight: 600;
  }

  .error-msg {
    background: #f5e8e8;
    border: 1px solid #d4a0a0;
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    color: #8a3030;
    margin-top: 12px;
    display: none;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-bear">🐻</div>
  <h1>每日睡眠日誌</h1>
  <p>記錄你的睡眠，讓我們一起照顧你的休息</p>
</div>

<div class="container">
  <div id="form-area">

    <div class="section">
      <div class="section-label">你是誰</div>
      <div class="field">
        <input type="text" id="f-name" placeholder="請輸入你的名字">
      </div>
    </div>

    <div class="section">
      <div class="section-label">填寫日期</div>
      <div class="field">
        <input type="date" id="f-date">
      </div>
    </div>

    <div class="section">
      <div class="section-label">昨晚的時間記錄</div>
      <div class="time-grid">
        <div class="field"><label>躺床時間</label><input type="time" id="f-bed"></div>
        <div class="field"><label>入睡時間</label><input type="time" id="f-sleep"></div>
        <div class="field"><label>醒來時間</label><input type="time" id="f-wake"></div>
        <div class="field"><label>起床時間</label><input type="time" id="f-up"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">中間有沒有醒來</div>
      <div class="radio-group" id="wakeup-group">
        <div class="radio-opt sel" data-val="none" onclick="pickWakeup(this)">
          <div class="radio-dot"></div><span>沒有醒來</span>
        </div>
        <div class="radio-opt" data-val="1-2" onclick="pickWakeup(this)">
          <div class="radio-dot"></div><span>醒來 1–2 次</span>
        </div>
        <div class="radio-opt" data-val="3+" onclick="pickWakeup(this)">
          <div class="radio-dot"></div><span>醒來 3 次以上</span>
        </div>
      </div>
    </div>

    <div class="section" id="wake-dur-section">
      <div class="section-label">大約醒了多久</div>
      <div class="radio-group" id="dur-group">
        <div class="radio-opt" data-val="lt5" onclick="pick(this,'dur-group')">
          <div class="radio-dot"></div><span>5 分鐘以內</span>
        </div>
        <div class="radio-opt" data-val="5-10" onclick="pick(this,'dur-group')">
          <div class="radio-dot"></div><span>5–10 分鐘</span>
        </div>
        <div class="radio-opt" data-val="10-15" onclick="pick(this,'dur-group')">
          <div class="radio-dot"></div><span>10–15 分鐘</span>
        </div>
        <div class="radio-opt" data-val="15-20" onclick="pick(this,'dur-group')">
          <div class="radio-dot"></div><span>15–20 分鐘</span>
        </div>
        <div class="radio-opt" data-val="20+" onclick="pick(this,'dur-group')">
          <div class="radio-dot"></div><span>20 分鐘或更久</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">醒來後是否難以再入睡</div>
      <div class="toggle-row">
        <div>
          <div class="toggle-text" id="insomnia-text">否</div>
          <div class="toggle-sub" id="insomnia-sub">醒來後可以順利再睡著</div>
        </div>
        <button class="switch" id="insomnia-sw" onclick="toggleInsomnia()"></button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">我覺得我昨天睡得…</div>
      <div class="fish-row" id="stars">
        <button class="fish-btn" onclick="rate(1)">🐟</button>
        <button class="fish-btn" onclick="rate(2)">🐟</button>
        <button class="fish-btn" onclick="rate(3)">🐟</button>
        <button class="fish-btn" onclick="rate(4)">🐟</button>
        <button class="fish-btn" onclick="rate(5)">🐟</button>
        <span class="fish-label" id="fish-label">尚未選擇</span>
      </div>
      <div class="quality-hint">
        <span>非常差</span><span>普通</span><span>非常好</span>
      </div>
    </div>

    <button class="submit" id="submit-btn" onclick="submitLog()">儲存日誌</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="success" id="success-area">
    <div class="success-bear">🐻</div>
    <h2>謝謝你的記錄！</h2>
    <p>小熊幫你把今天的睡眠日誌<br>安全地存起來了 🐟</p>
    <button onclick="resetForm()">繼續填寫</button>
  </div>
</div>

<script>
  // ====================================================
  // 🔧 Supabase 專案資訊
  const SUPABASE_URL = 'https://wxdyrowwzdptktdravpb.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4ZHlyb3d3emRwdGt0ZHJhdnBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzQwMzgsImV4cCI6MjA5MDU1MDAzOH0.G_v_X_aU8QCu5baa3PqktYAMniVzMIcDqpBuZEO_uFQ'
  // ====================================================

  const { createClient } = supabase
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let rating = 0
  let insomnia = false
  let wakeup = 'none'
  let wakeDur = ''

  const fishLabels = ['','很差，完全沒睡好','不太好，有點累','還可以，普普通通','不錯，有休息到','很好，睡得很舒服']

  document.getElementById('f-date').value = new Date().toISOString().slice(0,10)

  function pickWakeup(el) {
    document.querySelectorAll('#wakeup-group .radio-opt').forEach(o => o.classList.remove('sel'))
    el.classList.add('sel')
    wakeup = el.dataset.val
    const hasWake = wakeup !== 'none'
    document.getElementById('wake-dur-section').style.display = hasWake ? 'block' : 'none'
    if (!hasWake) {
      document.querySelectorAll('#dur-group .radio-opt').forEach(o => o.classList.remove('sel'))
      wakeDur = ''
    }
  }

  function pick(el, groupId) {
    document.querySelectorAll('#'+groupId+' .radio-opt').forEach(o => o.classList.remove('sel'))
    el.classList.add('sel')
    if (groupId === 'dur-group') wakeDur = el.dataset.val
  }

  function toggleInsomnia() {
    insomnia = !insomnia
    document.getElementById('insomnia-sw').classList.toggle('on', insomnia)
    document.getElementById('insomnia-text').textContent = insomnia ? '是' : '否'
    document.getElementById('insomnia-sub').textContent = insomnia ? '醒來後比較難再睡著' : '醒來後可以順利再睡著'
  }

  function rate(n) {
    rating = n
    document.querySelectorAll('#stars .fish-btn').forEach((s,i) => s.classList.toggle('lit', i < n))
    document.getElementById('fish-label').textContent = fishLabels[n]
  }

  async function submitLog() {
    const name  = document.getElementById('f-name').value.trim()
    const date  = document.getElementById('f-date').value
    const bed   = document.getElementById('f-bed').value
    const sleep = document.getElementById('f-sleep').value
    const wake  = document.getElementById('f-wake').value
    const up    = document.getElementById('f-up').value
    const errEl = document.getElementById('error-msg')

    if (!name)                             { showError('請填寫你的名字 🐻'); return }
    if (!date || !bed || !sleep || !wake || !up) { showError('請填寫完整的日期與時間欄位'); return }
    if (wakeup !== 'none' && !wakeDur)     { showError('請選擇大約醒來了多久'); return }
    if (rating === 0)                      { showError('請為昨天的睡眠評分 🐟'); return }

    const btn = document.getElementById('submit-btn')
    btn.disabled = true
    btn.textContent = '儲存中...'
    errEl.style.display = 'none'

    const { error } = await db.from('sleep_logs').insert({
      name,
      date,
      bed_time: bed,
      sleep_time: sleep,
      wake_time: wake,
      up_time: up,
      wakeup_count: wakeup,
      wake_duration: wakeDur || null,
      insomnia,
      quality: rating
    })

    if (error) {
      showError('儲存失敗：' + error.message)
      btn.disabled = false
      btn.textContent = '儲存日誌'
      return
    }

    document.getElementById('form-area').style.display = 'none'
    document.getElementById('success-area').style.display = 'block'
  }

  function showError(msg) {
    const el = document.getElementById('error-msg')
    el.textContent = msg
    el.style.display = 'block'
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' })
  }

  function resetForm() {
    document.getElementById('form-area').style.display = 'block'
    document.getElementById('success-area').style.display = 'none'
    document.getElementById('f-name').value = ''
    document.getElementById('f-date').value = new Date().toISOString().slice(0,10)
    document.getElementById('f-bed').value = ''
    document.getElementById('f-sleep').value = ''
    document.getElementById('f-wake').value = ''
    document.getElementById('f-up').value = ''
    rating = 0; insomnia = false; wakeup = 'none'; wakeDur = ''
    document.querySelectorAll('#stars .fish-btn').forEach(s => s.classList.remove('lit'))
    document.getElementById('fish-label').textContent = '尚未選擇'
    document.querySelectorAll('#wakeup-group .radio-opt').forEach((o,i) => o.classList.toggle('sel', i===0))
    document.querySelectorAll('#dur-group .radio-opt').forEach(o => o.classList.remove('sel'))
    document.getElementById('wake-dur-section').style.display = 'none'
    document.getElementById('insomnia-sw').classList.remove('on')
    document.getElementById('insomnia-text').textContent = '否'
    document.getElementById('insomnia-sub').textContent = '醒來後可以順利再睡著'
    document.getElementById('submit-btn').disabled = false
    document.getElementById('submit-btn').textContent = '儲存日誌'
    document.getElementById('error-msg').style.display = 'none'
  }
</script>
</body>
</html>
